<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B63E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D28A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8D0FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)" />

  <!-- Subtle card shape hint behind -->
  <rect x="80" y="290" width="352" height="20" rx="10" fill="rgba(255,255,255,0.08)" />
  <rect x="80" y="200" width="352" height="130" rx="18" fill="rgba(255,255,255,0.05)" />

  <!-- Outer ring -->
  <circle cx="256" cy="235" r="138" fill="none" stroke="url(#ringGrad)" stroke-width="14" opacity="0.9" />

  <!-- Inner filled circle (subtle) -->
  <circle cx="256" cy="235" r="120" fill="rgba(255,255,255,0.07)" />

  <!-- Checkmark -->
  <polyline
    points="176,235 230,295 340,175"
    fill="none"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Bottom accent dot -->
  <circle cx="368" cy="390" r="22" fill="#7B63E8" />
  <circle cx="368" cy="390" r="14" fill="white" opacity="0.9" />
</svg>
